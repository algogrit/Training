apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: temporal-transform-worker
spec:
  scaleTargetRef:
    name: temporal-transform-worker
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    # Native Temporal scaler polls DescribeTaskQueue directly — no Prometheus
    # exporter required. "ApprovalBacklogCount" is the Workflow/Activity task
    # backlog reported by the server. activationTargetQueueSize keeps the
    # Worker at minReplicaCount until the backlog crosses that threshold.
    - type: temporal
      metadata:
        endpoint: temporal-frontend.temporal.svc.cluster.local:7233
        namespace: production
        taskQueue: transform
        # Worker pool flavor: WorkflowTaskQueue or ActivityTaskQueue.
        queueType: ActivityTaskQueue
        targetQueueSize: "20"
        activationTargetQueueSize: "5"
