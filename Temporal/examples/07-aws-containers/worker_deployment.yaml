apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-transform-worker
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: temporal-transform-worker
  template:
    metadata:
      labels:
        app: temporal-transform-worker
    spec:
      serviceAccountName: temporal-worker
      # Long enough to let in-flight Activities finish or heartbeat-cancel.
      # Align with the longest Activity StartToCloseTimeout in this Worker.
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/temporal-transform-worker:latest
          env:
            - name: TEMPORAL_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: temporal-address
            - name: TEMPORAL_NAMESPACE
              value: production
            - name: TASK_QUEUE
              value: transform
          # The Worker is not an HTTP server, so use a process-level exec probe
          # instead of httpGet. "Process is alive and polling" is the real
          # health signal; for richer readiness, expose an Actuator endpoint
          # and switch this to httpGet on /actuator/health.
          readinessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f worker.jar > /dev/null"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f worker.jar > /dev/null"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
