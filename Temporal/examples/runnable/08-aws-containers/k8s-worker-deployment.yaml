apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-transform-worker
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: temporal-transform-worker
  template:
    metadata:
      labels:
        app: temporal-transform-worker
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: example.com/temporal-transform-worker:latest
          env:
            - name: TEMPORAL_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: temporal-address
            - name: TEMPORAL_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: temporal-namespace
            - name: TASK_QUEUE
              value: transform
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          # The Worker is not an HTTP server. Use a process-level exec probe
          # instead of httpGet; for richer readiness expose an Actuator
          # endpoint and switch to httpGet on /actuator/health.
          readinessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f worker.jar > /dev/null"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f worker.jar > /dev/null"]
            initialDelaySeconds: 30
            periodSeconds: 20

