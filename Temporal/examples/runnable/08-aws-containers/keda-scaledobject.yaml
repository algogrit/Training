apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: temporal-transform-worker
spec:
  scaleTargetRef:
    name: temporal-transform-worker
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    # KEDA's native Temporal scaler polls DescribeTaskQueue — no Prometheus
    # exporter required.
    - type: temporal
      metadata:
        endpoint: temporal-frontend.temporal.svc.cluster.local:7233
        namespace: production
        taskQueue: transform
        queueType: ActivityTaskQueue
        targetQueueSize: "20"
        activationTargetQueueSize: "5"
