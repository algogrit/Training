global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Temporal dev server metrics. start-temporal.sh enables --metrics-port 7234.
  - job_name: temporal-server
    static_configs:
      - targets: ["host.docker.internal:7234"]
        labels:
          component: server

  # Java Worker JVM metrics (Micrometer Prometheus endpoint).
  # See examples/05-production/micrometer_metrics.java for SDK wiring.
  # Workers that expose Micrometer should bind 0.0.0.0:9464 to be scraped.
  - job_name: temporal-worker
    static_configs:
      - targets: ["host.docker.internal:9464"]
        labels:
          component: worker
